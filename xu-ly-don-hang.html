<!doctype html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xử lý đơn hàng by Taideptrai/title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta property="og:title" content="T Order Processor">
  <meta property="og:description" content="Xử lý đơn hàng tự động">
  <meta property="og:image" content="preview.png">
  <meta property="og:type" content="website">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg1:#eaf2ff; --bg2:#f7fbff; --glass:rgba(255,255,255,.38); --glass-strong:rgba(255,255,255,.52);
      --stroke:rgba(255,255,255,.62); --text:#0b1220; --muted:#61708a; --primary:#0f6fff; --primary-dark:#0b57d0;
      --ok:#0f9f6e; --ok-bg:rgba(16,185,129,.12); --err:#dc2626; --err-bg:rgba(239,68,68,.12);
      --shadow:0 24px 70px rgba(43,76,140,.16); --shadow-strong:0 30px 90px rgba(43,76,140,.22); --blur:26px;
      --month:#21dbe3; --month-text:#001f29; --total-bg:#fff200; --table-border:#212121;
    }
    html[data-theme="dark"]{
      --bg1:#07101d; --bg2:#0b1526; --glass:rgba(10,18,34,.48); --glass-strong:rgba(12,22,40,.62);
      --stroke:rgba(255,255,255,.10); --text:#eef4ff; --muted:#95a4bf; --primary:#5ea2ff; --primary-dark:#2c7eff;
      --ok:#55d6a4; --ok-bg:rgba(16,185,129,.14); --err:#ff8c8c; --err-bg:rgba(239,68,68,.14);
      --shadow:0 24px 70px rgba(0,0,0,.36); --shadow-strong:0 30px 90px rgba(0,0,0,.48);
      --month:#12373d; --month-text:#c8fcff; --total-bg:#6b6500; --table-border:#5f6778;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(59,130,246,.22), transparent 24%),
        radial-gradient(circle at 84% 14%, rgba(125,211,252,.26), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(196,181,253,.22), transparent 28%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height:100vh; overflow-x:hidden; transition:background .35s ease,color .25s ease;
    }
    .ambient{position:fixed; inset:0; pointer-events:none; overflow:hidden; filter: blur(10px);}
    .orb{position:absolute; border-radius:999px; opacity:.75; animation:floatOrb 18s ease-in-out infinite;}
    .orb.a{width:360px;height:360px;background:rgba(59,130,246,.26);left:-100px;top:60px}
    .orb.b{width:300px;height:300px;background:rgba(125,211,252,.28);right:-80px;top:180px;animation-delay:-5s}
    .orb.c{width:280px;height:280px;background:rgba(196,181,253,.24);left:25%;bottom:-40px;animation-delay:-9s}
    @keyframes floatOrb{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(16px,-20px,0) scale(1.05)}}
    .wrap{max-width:1280px; margin:0 auto; padding:22px 14px 120px; position:relative; z-index:2;}
    .topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; opacity:0; transform:translateY(10px); animation:fadeUp .7s ease forwards;}
    .brand{display:flex; align-items:center; gap:14px;}
    .logo{
      width:58px; height:58px; border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.32)),linear-gradient(135deg,#0b1220 0%, #0f6fff 100%);
      border:1px solid rgba(255,255,255,.78); box-shadow:var(--shadow-strong), inset 0 1px 0 rgba(255,255,255,.88);
      backdrop-filter:blur(28px); display:flex; align-items:center; justify-content:center;
      font-size:30px; font-weight:900; letter-spacing:-1px; color:#08111f;
    }
    html[data-theme="dark"] .logo{color:#eef4ff}
    .brand-title{color:var(--muted); font-size:14px; font-weight:700; margin-bottom:4px;}
    .brand h1{margin:0; font-size:30px; line-height:1.04; letter-spacing:-.04em; font-weight:850;}
    .mode-toggle{
      border:none; cursor:pointer; padding:12px 16px; border-radius:999px; background:rgba(255,255,255,.44); border:1px solid rgba(255,255,255,.72);
      box-shadow:var(--shadow); backdrop-filter:blur(26px) saturate(160%); color:var(--text);
      font-size:13px; font-weight:800; display:inline-flex; align-items:center; gap:10px; transition:.22s ease;
    }
    .mode-toggle:hover{transform:translateY(-1px)}
    .mode-toggle svg,.btn svg,.pick-file-btn svg,.pill svg,.tab svg,.sf-icon svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .card{
      background:var(--glass); border:1px solid var(--stroke); border-radius:36px;
      box-shadow:var(--shadow-strong), inset 0 1px 0 rgba(255,255,255,.86);
      backdrop-filter:blur(var(--blur)) saturate(180%); -webkit-backdrop-filter:blur(var(--blur)) saturate(180%);
    }
    .main-card{padding:24px; position:relative; overflow:hidden; opacity:0; transform:translateY(16px) scale(.988); animation:fadeScale .82s cubic-bezier(.2,.8,.2,1) .06s forwards;}
    .main-card::before{content:""; position:absolute; width:260px; height:260px; right:-80px; top:-90px; border-radius:999px; background:radial-gradient(circle, rgba(59,130,246,.22), transparent 66%); pointer-events:none;}
    .hero{margin-top:4px;}
    .hero h2{margin:0 0 10px; font-size:42px; line-height:1.02; letter-spacing:-.05em; font-weight:900; max-width:900px;}
    .hero p{margin:0; color:var(--muted); font-size:16px; line-height:1.75; max-width:920px;}
    .drop-shell{margin-top:22px; padding:14px; border-radius:32px; background:rgba(255,255,255,.32); border:1px solid rgba(255,255,255,.62); box-shadow: inset 0 1px 0 rgba(255,255,255,.84); backdrop-filter:blur(24px);}
    html[data-theme="dark"] .drop-shell{background:rgba(255,255,255,.03); border-color:rgba(255,255,255,.10)}
    .dropzone{
      min-height:330px; border-radius:30px; border:1.5px dashed rgba(15,111,255,.28); background:linear-gradient(180deg, rgba(255,255,255,.56) 0%, rgba(255,255,255,.28) 100%);
      display:flex; align-items:center; justify-content:center; text-align:center; padding:28px 18px; transition:.32s cubic-bezier(.2,.8,.2,1); position:relative; overflow:hidden; box-shadow: inset 0 1px 0 rgba(255,255,255,.82);
    }
    html[data-theme="dark"] .dropzone{background:linear-gradient(180deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,.03) 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,.06);}
    .dropzone.drag{transform:translateY(-2px) scale(1.01); border-color:rgba(15,111,255,.52); background:linear-gradient(180deg, rgba(239,246,255,.82) 0%, rgba(255,255,255,.36) 100%); box-shadow:0 22px 40px rgba(15,111,255,.14), inset 0 1px 0 rgba(255,255,255,.92);}
    html[data-theme="dark"] .dropzone.drag{background:linear-gradient(180deg, rgba(35,67,120,.32) 0%, rgba(255,255,255,.06) 100%)}
    .upload-box{max-width:780px; position:relative; z-index:2;}
    .sf-icon{
      width:96px; height:96px; margin:0 auto 16px; border-radius:30px; display:flex; align-items:center; justify-content:center; color:var(--primary);
      background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(239,246,255,.6)); border:1px solid rgba(255,255,255,.88); box-shadow:0 18px 34px rgba(15,111,255,.12), inset 0 1px 0 rgba(255,255,255,.95);
      animation:pulseSoft 3.4s ease-in-out infinite; cursor:pointer; transition:transform .22s ease, box-shadow .22s ease;
    }
    .sf-icon:hover{transform:translateY(-2px) scale(1.02); box-shadow:0 22px 40px rgba(15,111,255,.16), inset 0 1px 0 rgba(255,255,255,.96);}
    .sf-icon:active{transform:scale(.97)}
    html[data-theme="dark"] .sf-icon{background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04)); border-color:rgba(255,255,255,.12)}
    .sf-icon svg{width:42px;height:42px}
    @keyframes pulseSoft{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.03)}}
    .upload-box h3{margin:0 0 8px; font-size:28px; letter-spacing:-.04em;}
    .upload-box p{margin:0; color:var(--muted); font-size:15px; line-height:1.72;}
    .file-input-wrap{margin-top:18px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap;}
    .visually-hidden{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important;}
    .pick-file-btn{
      display:inline-flex; align-items:center; gap:10px; padding:14px 18px; border-radius:18px; background:rgba(255,255,255,.78); border:1px solid rgba(255,255,255,.88); box-shadow:0 12px 24px rgba(15,23,42,.06), inset 0 1px 0 rgba(255,255,255,.94);
      color:var(--text); font-size:15px; font-weight:800; letter-spacing:-.01em; cursor:pointer; transition:transform .22s ease, box-shadow .22s ease, background .22s ease; user-select:none;
    }
    .pick-file-btn:hover{transform:translateY(-1px); box-shadow:0 16px 28px rgba(15,111,255,.14), inset 0 1px 0 rgba(255,255,255,.96);}
    .pick-file-btn:active{transform:scale(.97)}
    html[data-theme="dark"] .pick-file-btn{background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.10); box-shadow:0 12px 24px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.08);}
    .upload-tip{margin-top:12px; color:var(--muted); font-size:13px; line-height:1.55; font-weight:600;}
    .selected-files{
      margin-top:16px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    }
    .pill{
      display:inline-flex; align-items:center; gap:10px; padding:12px 16px; border-radius:999px; background:rgba(255,255,255,.72); border:1px solid rgba(255,255,255,.86); box-shadow:0 14px 30px rgba(15,23,42,.08);
      backdrop-filter:blur(24px); font-size:14px; font-weight:800; color:#334155; animation:fadeScale .35s ease;
    }
    html[data-theme="dark"] .pill{background:rgba(255,255,255,.08); color:#e5efff; border-color:rgba(255,255,255,.10)}
    .meta-form{
      margin-top:18px; display:grid; grid-template-columns:repeat(2,minmax(240px,1fr)); gap:12px;
    }
    .meta-card{
      padding:14px; border-radius:22px; background:rgba(255,255,255,.34); border:1px solid rgba(255,255,255,.74); box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
      text-align:left;
    }
    html[data-theme="dark"] .meta-card{background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.10)}
    .meta-card label{display:block; margin-bottom:8px; font-size:13px; color:var(--muted); font-weight:800;}
    .meta-input{
      width:100%; padding:12px 14px; border-radius:16px; border:1px solid rgba(255,255,255,.86); background:rgba(255,255,255,.78); color:var(--text);
      outline:none; font:inherit; font-weight:700;
    }
    .meta-input:focus{border-color:rgba(15,111,255,.55); box-shadow:0 0 0 4px rgba(15,111,255,.10)}
    html[data-theme="dark"] .meta-input{background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.10)}
    .actions{margin-top:18px; display:flex; gap:12px; flex-wrap:wrap;}
    .btn{
      position:relative; overflow:hidden; border:none; border-radius:22px; padding:16px 20px; font-size:15px; font-weight:850; letter-spacing:-.015em; cursor:pointer; transition:.25s ease; display:inline-flex; align-items:center; gap:10px;
    }
    .btn::after{content:""; position:absolute; inset:0; background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.22) 50%, transparent 100%); transform:translateX(-120%); transition:transform .45s ease; pointer-events:none;}
    .btn:hover::after{transform:translateX(120%)}
    .btn:active{transform:scale(.965)!important; transition:transform .08s ease}
    .btn-primary{color:#fff; background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); box-shadow:0 16px 30px rgba(15,111,255,.26);}
    .btn-primary:hover{transform:translateY(-1px); box-shadow:0 18px 34px rgba(15,111,255,.30)}
    .btn-secondary{color:var(--text); background:rgba(255,255,255,.62); border:1px solid rgba(255,255,255,.82); box-shadow: inset 0 1px 0 rgba(255,255,255,.90);}
    html[data-theme="dark"] .btn-secondary{background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.10)}
    .btn:disabled{opacity:.56; cursor:not-allowed; transform:none !important}
    .status{display:none; margin-top:16px; padding:15px 16px; border-radius:20px; font-size:14px; font-weight:800; animation:fadeUp .35s ease; backdrop-filter:blur(20px);}
    .status.show{display:block}
    .status.ok{color:var(--ok); background:var(--ok-bg); border:1px solid rgba(16,185,129,.18)}
    .status.err{color:var(--err); background:var(--err-bg); border:1px solid rgba(239,68,68,.18)}
    .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:18px;}
    .stat{
      padding:18px; border-radius:26px; background:var(--glass-strong); border:1px solid rgba(255,255,255,.78); box-shadow: inset 0 1px 0 rgba(255,255,255,.92);
      opacity:0; transform:translateY(6px); animation:fadeUp .45s ease forwards; backdrop-filter:blur(24px) saturate(180%);
    }
    .stat:nth-child(2){animation-delay:.03s}.stat:nth-child(3){animation-delay:.06s}.stat:nth-child(4){animation-delay:.09s}
    html[data-theme="dark"] .stat{border-color:rgba(255,255,255,.10)}
    .stat-label{color:var(--muted); font-size:13px; margin-bottom:6px; font-weight:700;}
    .stat-value{font-size:30px; line-height:1; letter-spacing:-.04em; font-weight:900;}
    .compare-shell{
      margin-top:18px; padding:10px; border-radius:30px; background:rgba(255,255,255,.24); border:1px solid rgba(255,255,255,.68); box-shadow: inset 0 1px 0 rgba(255,255,255,.84); backdrop-filter:blur(24px);
    }
    html[data-theme="dark"] .compare-shell{background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.10)}
    .compare-wrap{
      border-radius:24px; overflow:hidden; background:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.82); box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
    }
    html[data-theme="dark"] .compare-wrap{background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.10)}
    .compare-scroll{overflow:auto; max-height:620px}
    .compare-table{width:100%; border-collapse:collapse; min-width:1400px; font-size:13px}
    .compare-table th,.compare-table td{border:2px solid var(--table-border); padding:8px 10px; text-align:center; vertical-align:middle}
    .compare-table thead th{background:#f3f3f3; font-weight:900; font-size:15px}
    html[data-theme="dark"] .compare-table thead th{background:#131d30}
    .compare-table .head-main{font-size:17px}
    .compare-table .left-head{text-align:center; min-width:90px}
    .compare-table .name-head, .compare-table .name-cell{text-align:left}
    .compare-table .name-cell{min-width:240px}
    .compare-table .month{background:var(--month)!important; color:var(--month-text)!important; font-size:16px}
    .compare-table .total-row td{background:var(--total-bg); font-weight:900; font-size:18px}
    .compare-table tbody tr:hover td{background:rgba(15,111,255,.06)}
    .section-note{margin-top:12px; color:var(--muted); font-size:13px; line-height:1.55; font-weight:700}
    .tabbar-wrap{position:fixed; left:50%; bottom:16px; transform:translateX(-50%); width:min(720px, calc(100% - 24px)); z-index:30;}
    .tabbar{
      display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:10px; border-radius:30px; background:rgba(255,255,255,.44); border:1px solid rgba(255,255,255,.76);
      box-shadow:var(--shadow-strong), inset 0 1px 0 rgba(255,255,255,.94); backdrop-filter:blur(30px) saturate(190%);
    }
    html[data-theme="dark"] .tabbar{background:rgba(11,17,31,.56); border-color:rgba(255,255,255,.10)}
    .tab{
      min-height:68px; border-radius:22px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:7px; color:#718198; text-decoration:none; font-size:12px; font-weight:800; letter-spacing:.01em; transition:.22s ease; user-select:none; cursor:pointer; border:none; background:transparent;
    }
    html[data-theme="dark"] .tab{color:#94a3b8}
    .tab.active{color:var(--primary); background:rgba(255,255,255,.56); box-shadow: inset 0 1px 0 rgba(255,255,255,.95), 0 10px 20px rgba(15,111,255,.12);}
    html[data-theme="dark"] .tab.active{background:rgba(255,255,255,.08)}
    .tab:active{transform:scale(.96)}
    .splash-overlay{
      position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;
      background:radial-gradient(circle at 20% 20%, rgba(59,130,246,.14), transparent 25%), radial-gradient(circle at 80% 18%, rgba(125,211,252,.12), transparent 24%), linear-gradient(180deg, rgba(234,242,255,.74) 0%, rgba(247,251,255,.76) 100%);
      backdrop-filter:blur(18px) saturate(180%); transition:opacity .42s ease, visibility .42s ease;
    }
    html[data-theme="dark"] .splash-overlay{background:radial-gradient(circle at 20% 20%, rgba(59,130,246,.12), transparent 25%), radial-gradient(circle at 80% 18%, rgba(125,211,252,.08), transparent 24%), linear-gradient(180deg, rgba(7,16,29,.80) 0%, rgba(11,21,38,.82) 100%)}
    .splash-overlay.hide{opacity:0; visibility:hidden; pointer-events:none}
    .splash-card{
      width:min(220px, calc(100vw - 48px)); padding:18px 18px 16px; border-radius:30px; text-align:center; background:rgba(255,255,255,.34);
      border:1px solid rgba(255,255,255,.64); box-shadow:0 30px 90px rgba(43,76,140,.14), inset 0 1px 0 rgba(255,255,255,.9); backdrop-filter:blur(26px) saturate(180%); transform:scale(1); animation:splashPulse 1.2s ease-in-out infinite;
    }
    html[data-theme="dark"] .splash-card{background:rgba(10,18,34,.46); border-color:rgba(255,255,255,.10); box-shadow:0 30px 90px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.08)}
    @keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
    .splash-title{margin-top:12px; font-size:22px; font-weight:900; letter-spacing:-.04em}
    .splash-subtitle{margin-top:6px; font-size:13px; color:var(--muted); font-weight:700}
    .cat-face{width:120px; height:110px; position:relative; margin:0 auto; border-radius:46% 46% 42% 42%; background:linear-gradient(180deg, #fff 0%, #eef4ff 100%); border:2px solid rgba(15,111,255,.18); box-shadow:0 16px 28px rgba(15,111,255,.10), inset 0 1px 0 rgba(255,255,255,.95); animation:catRun 0.95s linear infinite}
    html[data-theme="dark"] .cat-face{background:linear-gradient(180deg, rgba(255,255,255,.14) 0%, rgba(255,255,255,.08) 100%); border-color:rgba(255,255,255,.10)}
    @keyframes catRun{0%{transform:translateX(-6px)}25%{transform:translateX(6px)}50%{transform:translateX(-2px)}75%{transform:translateX(5px)}100%{transform:translateX(-6px)}}
    .cat-face::after{content:""; position:absolute; left:50%; bottom:-18px; transform:translateX(-50%); width:84px; height:4px; border-radius:999px; background:linear-gradient(90deg, transparent 0%, rgba(15,111,255,.15) 20%, rgba(15,111,255,.35) 50%, rgba(15,111,255,.15) 80%, transparent 100%); animation:trackMove 0.95s linear infinite}
    @keyframes trackMove{0%{transform:translateX(-50%) scaleX(.88)}50%{transform:translateX(-50%) scaleX(1.06)}100%{transform:translateX(-50%) scaleX(.88)}}
    .cat-ears .ear{position:absolute; top:-18px; width:34px; height:34px; background:linear-gradient(180deg, #fff 0%, #eef4ff 100%); border:2px solid rgba(15,111,255,.18); z-index:-1}
    html[data-theme="dark"] .cat-ears .ear{background:linear-gradient(180deg, rgba(255,255,255,.14) 0%, rgba(255,255,255,.08) 100%); border-color:rgba(255,255,255,.10)}
    .cat-ears .left{left:12px; border-radius:8px 24px 8px 24px; transform:rotate(-32deg)} .cat-ears .right{right:12px; border-radius:24px 8px 24px 8px; transform:rotate(32deg)}
    .cat-eyes{position:absolute; left:0; right:0; top:38px; display:flex; justify-content:center; gap:24px}
    .eye{width:12px; height:16px; border-radius:999px; background:#0f6fff; animation:blink 2.4s infinite; transform-origin:center}
    html[data-theme="dark"] .eye{background:#8fc1ff}
    @keyframes blink{0%,44%,48%,100%{transform:scaleY(1)}46%{transform:scaleY(.08)}}
    .cat-nose{position:absolute; left:50%; top:58px; transform:translateX(-50%); width:12px; height:9px; background:#ff8aa0; border-radius:60% 60% 80% 80%}
    .cat-mouth{position:absolute; left:50%; top:68px; transform:translateX(-50%); width:22px; height:12px}
    .cat-mouth::before,.cat-mouth::after{content:""; position:absolute; top:0; width:10px; height:8px; border-bottom:2px solid #64748b; border-radius:0 0 12px 12px}
    .cat-mouth::before{right:50%}.cat-mouth::after{left:50%}
    .cat-whiskers{position:absolute; top:61px; width:36px; display:grid; gap:6px}
    .cat-whiskers.left{left:-24px}.cat-whiskers.right{right:-24px}
    .cat-whiskers span{display:block; height:2px; background:rgba(100,116,139,.8); border-radius:99px}
    .cat-whiskers.left span:nth-child(1){transform:rotate(12deg)} .cat-whiskers.left span:nth-child(3){transform:rotate(-12deg)} .cat-whiskers.right span:nth-child(1){transform:rotate(-12deg)} .cat-whiskers.right span:nth-child(3){transform:rotate(12deg)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}} @keyframes fadeScale{from{opacity:0;transform:translateY(16px) scale(.988)}to{opacity:1;transform:translateY(0) scale(1)}}
    @media (max-width:960px){
      .hero h2{font-size:34px}
      .stats{grid-template-columns:1fr 1fr}
      .meta-form{grid-template-columns:1fr}
    }

<script>
(function(){
  const fileInput = document.getElementById('fileInput');
  const processBtn = document.getElementById('processBtn');
  const resetBtn = document.getElementById('resetBtn');
  const dropzone = document.getElementById('dropzone');
  const okBox = document.getElementById('okBox');
  const errBox = document.getElementById('errBox');
  const stats = document.getElementById('stats');
  const statFiles = document.getElementById('statFiles');
  const statProducts = document.getElementById('statProducts');
  const statOrdersA = document.getElementById('statOrdersA');
  const statOrdersB = document.getElementById('statOrdersB');
  const selectedFilesEl = document.getElementById('selectedFiles');
  const compareHead = document.getElementById('compareHead');
  const compareBody = document.getElementById('compareBody');
  const previewWrap = document.getElementById('section-preview');
  const themeToggle = document.getElementById('themeToggle');
  const themeLabel = document.getElementById('themeLabel');
  const themeIcon = document.getElementById('themeIcon');
  const tabUpload = document.getElementById('tabUpload');
  const tabPreview = document.getElementById('tabPreview');
  const tabDownload = document.getElementById('tabDownload');
  const sectionUpload = document.getElementById('section-upload');
  const labelAInput = document.getElementById('labelA');
  const labelBInput = document.getElementById('labelB');

  let selectedFiles = [];
  let lastDownloadBlob = null;
  let lastDownloadName = '';

  function normalizeKey(v){ return String(v ?? '').trim(); }
  function normalizeStatus(v){ return String(v ?? '').trim().toLowerCase(); }

  function setActiveTab(tab){
    [tabUpload, tabPreview, tabDownload].forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  }

  function applyTheme(theme){
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('t-order-theme', theme);
    if(theme === 'dark'){
      themeLabel.textContent = 'Light mode';
      themeIcon.innerHTML = '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"></path>';
    } else {
      themeLabel.textContent = 'Dark mode';
      themeIcon.innerHTML = '<path d="M12 3v2.5"></path><path d="M12 18.5V21"></path><path d="m4.93 4.93 1.77 1.77"></path><path d="m17.3 17.3 1.77 1.77"></path><path d="M3 12h2.5"></path><path d="M18.5 12H21"></path><path d="m4.93 19.07 1.77-1.77"></path><path d="m17.3 6.7 1.77-1.77"></path><circle cx="12" cy="12" r="4"></circle>';
    }
  }

  function initTheme(){
    const saved = localStorage.getItem('t-order-theme') || 'light';
    applyTheme(saved);
  }

  function hideMessages(){
    okBox.className = 'status ok';
    errBox.className = 'status err';
    okBox.textContent = '';
    errBox.textContent = '';
  }

  function showOk(msg){
    okBox.textContent = msg;
    okBox.className = 'status ok show';
  }

  function showErr(msg){
    errBox.textContent = msg;
    errBox.className = 'status err show';
  }

  function pickRepresentativeName(names){
    const filtered = names.map(x => String(x ?? '').trim()).filter(Boolean);
    if(!filtered.length) return '';
    const freq = {};
    filtered.forEach(n => { freq[n] = (freq[n] || 0) + 1; });
    return Object.entries(freq).sort((a,b) => b[1]-a[1] || a[0].length-b[0].length)[0][0];
  }

  function findColumn(columns, candidates){
    const map = new Map(columns.map(c => [String(c).trim().toLowerCase(), c]));
    for(const c of candidates){
      const found = map.get(c.toLowerCase());
      if(found) return found;
    }
    return null;
  }

  function processOrders(rows){
    if(!rows.length) throw new Error('File không có dữ liệu.');

    const columns = Object.keys(rows[0] || {});
    const productCodeCol = findColumn(columns, ['Mã sản phẩm','Ma san pham','SKU','Product Code','Mã SP']);
    const productNameCol = findColumn(columns, ['Tên sản phẩm','Ten san pham','Product Name','Tên SP']);
    const orderCodeCol = findColumn(columns, ['Mã đơn','Mã đơn hàng','Ma don','Ma don hang','Order ID','Order Code']);
    const statusCol = findColumn(columns, ['Trạng thái','Trang thai','Status','Tình trạng']);

    if(!productCodeCol || !orderCodeCol || !statusCol){
      throw new Error('Không tìm thấy đủ cột bắt buộc. Cần có ít nhất: Mã sản phẩm, Mã đơn hàng, Trạng thái.');
    }

    const RECEIVED = new Set([normalizeStatus('Đã nhận')]);
    const RETURNED = new Set([normalizeStatus('Đang hoàn'), normalizeStatus('Đã hoàn')]);

    const grouped = new Map();

    for(const row of rows){
      const productCode = normalizeKey(row[productCodeCol]);
      const orderCode = normalizeKey(row[orderCodeCol]);
      const status = normalizeStatus(row[statusCol]);
      const productName = productNameCol ? row[productNameCol] : '';

      if(!productCode || !orderCode) continue;

      if(!grouped.has(productCode)){
        grouped.set(productCode, {
          productCode,
          productNames: [],
          totalOrders: new Set(),
          receivedOrders: new Set(),
          returnedOrders: new Set(),
          shippedOrders: new Set()
        });
      }

      const item = grouped.get(productCode);
      item.productNames.push(productName);
      item.totalOrders.add(orderCode);

      if(RECEIVED.has(status)) item.receivedOrders.add(orderCode);
      if(RETURNED.has(status)) item.returnedOrders.add(orderCode);
      item.shippedOrders.add(orderCode);
    }

    const summary = Array.from(grouped.values())
      .map(item => {
        const total = item.totalOrders.size;
        const shipped = Math.min(item.shippedOrders.size, total);
        return {
          code: item.productCode,
          name: pickRepresentativeName(item.productNames),
          total: total,
          shipped: shipped,
          received: item.receivedOrders.size,
          returned: item.returnedOrders.size
        };
      })
      .filter(r => r.total > 0)
      .sort((a,b) =>
        (b.total - a.total) ||
        (b.shipped - a.shipped) ||
        (b.received - a.received) ||
        (b.returned - a.returned) ||
        String(a.code).localeCompare(String(b.code), 'vi')
      );

    const map = new Map(summary.map(item => [item.code, item]));
    return {
      summary,
      map,
      totals: {
        total: summary.reduce((acc, r) => acc + r.total, 0),
        shipped: summary.reduce((acc, r) => acc + r.shipped, 0),
        received: summary.reduce((acc, r) => acc + r.received, 0),
        returned: summary.reduce((acc, r) => acc + r.returned, 0)
      }
    };
  }

  function mergeTwoSummaries(left, right){
    const unionCodes = Array.from(new Set([
      ...left.summary.map(x => x.code),
      ...right.summary.map(x => x.code)
    ]));

    const rows = unionCodes.map(code => {
      const l = left.map.get(code) || { code, name:'', total:0, shipped:0, received:0, returned:0 };
      const r = right.map.get(code) || { code, name:'', total:0, shipped:0, received:0, returned:0 };
      return {
        code,
        name: l.name || r.name || '',
        left: l,
        right: r
      };
    });

    rows.sort((a,b) =>
      ((b.left.total + b.right.total) - (a.left.total + a.right.total)) ||
      ((b.left.shipped + b.right.shipped) - (a.left.shipped + a.right.shipped)) ||
      ((b.left.received + b.right.received) - (a.left.received + a.right.received)) ||
      ((b.left.returned + b.right.returned) - (a.left.returned + a.right.returned)) ||
      String(a.code).localeCompare(String(b.code), 'vi')
    );

    return rows.map((row, idx) => ({ stt: idx + 2, ...row }));
  }

  function renderSingleTable(result){
    compareHead.innerHTML = `
      <tr>
        <th class="head-main">STT</th>
        <th class="head-main">Mã SP</th>
        <th class="head-main name-head">Tên SP</th>
        <th class="head-main">Tổng SL đơn</th>
        <th class="head-main">SL đơn đã gửi</th>
        <th class="head-main">SL đơn đã giao TC</th>
        <th class="head-main">SL đơn đã hoàn</th>
      </tr>
    `;

    compareBody.innerHTML = `
      <tr class="total-row">
        <td></td>
        <td></td>
        <td class="name-cell">Tổng cộng</td>
        <td>${result.totals.total}</td>
        <td>${result.totals.shipped}</td>
        <td>${result.totals.received}</td>
        <td>${result.totals.returned}</td>
      </tr>
    `;

    result.summary.forEach((row, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${idx + 2}</td>
        <td>${escapeHtml(row.code)}</td>
        <td class="name-cell">${escapeHtml(row.name)}</td>
        <td>${row.total}</td>
        <td>${row.shipped}</td>
        <td>${row.received}</td>
        <td>${row.returned}</td>
      `;
      compareBody.appendChild(tr);
    });
  }

  function buildSingleWorkbookBlob(result, originalRows){
    const wb = XLSX.utils.book_new();

    const summaryRows = result.summary.map((r, idx) => ({
      'STT': idx + 2,
      'Mã SP': r.code,
      'Tên SP': r.name,
      'Tổng SL đơn': r.total,
      'SL đơn đã gửi': r.shipped,
      'SL đơn đã giao TC': r.received,
      'SL đơn đã hoàn': r.returned
    }));

    const wsSummary = XLSX.utils.json_to_sheet(summaryRows, { origin: 'A3' });
    XLSX.utils.sheet_add_aoa(wsSummary, [[
      'STT','Mã SP','Tên SP','Tổng SL đơn','SL đơn đã gửi','SL đơn đã giao TC','SL đơn đã hoàn'
    ]], { origin: 'A2' });
    XLSX.utils.sheet_add_aoa(wsSummary, [[
      '', '', 'Tổng cộng',
      result.totals.total, result.totals.shipped, result.totals.received, result.totals.returned
    ]], { origin: 'A3' });
    wsSummary['!cols'] = [{wch:8},{wch:18},{wch:34},{wch:14},{wch:14},{wch:16},{wch:14}];

    const wsRaw = XLSX.utils.json_to_sheet(originalRows);

    XLSX.utils.book_append_sheet(wb, wsSummary, 'Tong_hop');
    XLSX.utils.book_append_sheet(wb, wsRaw, 'Du_lieu_goc');

    const array = XLSX.write(wb, { bookType:'xlsx', type:'array' });
    return new Blob([array], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');
  }

  function renderSelectedFiles(){
    selectedFilesEl.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
      const pill = document.createElement('div');
      pill.className = 'pill';
      pill.innerHTML = `
        <svg viewBox="0 0 24 24">
          <path d="M19 13v4a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4"></path>
          <path d="M14 5h5v5"></path>
          <path d="M10 14 19 5"></path>
        </svg>
        <span>${idx + 1}. ${escapeHtml(file.name)}</span>
      `;
      selectedFilesEl.appendChild(pill);
    });

    if(selectedFiles[0] && !labelAInput.value.trim()){
      labelAInput.value = suggestLabel(selectedFiles[0].name);
    }
    if(selectedFiles[1] && !labelBInput.value.trim()){
      labelBInput.value = suggestLabel(selectedFiles[1].name);
    }
  }

  function suggestLabel(filename){
    const clean = String(filename || '').replace(/\.xlsx?$/i,'').trim();
    return clean.slice(0, 30) || 'Kỳ dữ liệu';
  }

  function setFiles(fileList){
    selectedFiles = Array.from(fileList || []);
    hideMessages();
    stats.style.display = 'none';
    previewWrap.style.display = 'none';
    compareHead.innerHTML = '';
    compareBody.innerHTML = '';
    lastDownloadBlob = null;
    lastDownloadName = '';
    renderSelectedFiles();
    const metaForm = document.getElementById('metaForm');
    if(metaForm){
      metaForm.style.display = selectedFiles.length >= 2 ? 'grid' : 'none';
    }
  }

  function triggerDownload(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function buildWorkbookBlob(leftLabel, rightLabel, leftResult, rightResult, mergedRows, originalLeftRows, originalRightRows){
    const wb = XLSX.utils.book_new();

    const compareRows = mergedRows.map(row => ({
      'STT': row.stt,
      'Mã SP': row.code,
      'Tên SP': row.name,
      [`${leftLabel} - Tổng SL đơn`]: row.left.total,
      [`${leftLabel} - SL đơn đã gửi`]: row.left.shipped,
      [`${leftLabel} - SL đơn đã giao TC`]: row.left.received,
      [`${leftLabel} - SL đơn đã hoàn`]: row.left.returned,
      [`${rightLabel} - Tổng SL đơn`]: row.right.total,
      [`${rightLabel} - SL đơn đã gửi`]: row.right.shipped,
      [`${rightLabel} - SL đơn đã giao TC`]: row.right.received,
      [`${rightLabel} - SL đơn đã hoàn`]: row.right.returned
    }));

    const wsCompare = XLSX.utils.json_to_sheet(compareRows, { origin: 'A3' });
    const monthRow = [
      '', '', '',
      leftLabel, '', '', '',
      rightLabel, '', '', ''
    ];
    XLSX.utils.sheet_add_aoa(wsCompare, [monthRow], { origin: 'A1' });
    XLSX.utils.sheet_add_aoa(wsCompare, [[
      'STT','Mã SP','Tên SP',
      'Tổng SL đơn','SL đơn đã gửi','SL đơn đã giao TC','SL đơn đã hoàn',
      'Tổng SL đơn','SL đơn đã gửi','SL đơn đã giao TC','SL đơn đã hoàn'
    ]], { origin: 'A2' });
    XLSX.utils.sheet_add_aoa(wsCompare, [[
      '', '', 'Tổng cộng',
      leftResult.totals.total, leftResult.totals.shipped, leftResult.totals.received, leftResult.totals.returned,
      rightResult.totals.total, rightResult.totals.shipped, rightResult.totals.received, rightResult.totals.returned
    ]], { origin: 'A3' });

    wsCompare['!cols'] = [
      {wch:8},{wch:18},{wch:34},
      {wch:14},{wch:14},{wch:16},{wch:14},
      {wch:14},{wch:14},{wch:16},{wch:14}
    ];
    wsCompare['!merges'] = [
      {s:{r:0,c:3}, e:{r:0,c:6}},
      {s:{r:0,c:7}, e:{r:0,c:10}},
      {s:{r:1,c:0}, e:{r:1,c:0}},
      {s:{r:1,c:1}, e:{r:1,c:1}},
      {s:{r:1,c:2}, e:{r:1,c:2}}
    ];

    const wsLeftRaw = XLSX.utils.json_to_sheet(originalLeftRows);
    const wsRightRaw = XLSX.utils.json_to_sheet(originalRightRows);
    const wsLeftSummary = XLSX.utils.json_to_sheet(leftResult.summary.map(r => ({
      'Mã SP': r.code, 'Tên SP': r.name, 'Tổng SL đơn': r.total, 'SL đơn đã gửi': r.shipped, 'SL đơn đã giao TC': r.received, 'SL đơn đã hoàn': r.returned
    })));
    const wsRightSummary = XLSX.utils.json_to_sheet(rightResult.summary.map(r => ({
      'Mã SP': r.code, 'Tên SP': r.name, 'Tổng SL đơn': r.total, 'SL đơn đã gửi': r.shipped, 'SL đơn đã giao TC': r.received, 'SL đơn đã hoàn': r.returned
    })));

    XLSX.utils.book_append_sheet(wb, wsCompare, 'So_sanh');
    XLSX.utils.book_append_sheet(wb, wsLeftSummary, 'Tong_hop_1');
    XLSX.utils.book_append_sheet(wb, wsRightSummary, 'Tong_hop_2');
    XLSX.utils.book_append_sheet(wb, wsLeftRaw, 'Du_lieu_goc_1');
    XLSX.utils.book_append_sheet(wb, wsRightRaw, 'Du_lieu_goc_2');

    const array = XLSX.write(wb, { bookType:'xlsx', type:'array' });
    return new Blob([array], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  }

  function renderCompareTable(leftLabel, rightLabel, leftResult, rightResult, mergedRows){
    compareHead.innerHTML = `
      <tr>
        <th class="left-head"></th>
        <th class="month" colspan="4">${escapeHtml(leftLabel)}</th>
        <th class="left-head"></th>
        <th class="month" colspan="4">${escapeHtml(rightLabel)}</th>
      </tr>
      <tr>
        <th class="head-main">STT</th>
        <th class="head-main">Mã SP</th>
        <th class="head-main name-head">Tên SP</th>
        <th class="head-main">Tổng SL đơn</th>
        <th class="head-main">SL đơn đã gửi</th>
        <th class="head-main">SL đơn đã giao TC</th>
        <th class="head-main">SL đơn đã hoàn</th>
        <th class="head-main">Tổng SL đơn</th>
        <th class="head-main">SL đơn đã gửi</th>
        <th class="head-main">SL đơn đã giao TC</th>
        <th class="head-main">SL đơn đã hoàn</th>
      </tr>
    `;

    compareBody.innerHTML = `
      <tr class="total-row">
        <td></td>
        <td></td>
        <td class="name-cell">Tổng cộng</td>
        <td>${leftResult.totals.total}</td>
        <td>${leftResult.totals.shipped}</td>
        <td>${leftResult.totals.received}</td>
        <td>${leftResult.totals.returned}</td>
        <td>${rightResult.totals.total}</td>
        <td>${rightResult.totals.shipped}</td>
        <td>${rightResult.totals.received}</td>
        <td>${rightResult.totals.returned}</td>
      </tr>
    `;

    mergedRows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${row.stt}</td>
        <td>${escapeHtml(row.code)}</td>
        <td class="name-cell">${escapeHtml(row.name)}</td>
        <td>${row.left.total}</td>
        <td>${row.left.shipped}</td>
        <td>${row.left.received}</td>
        <td>${row.left.returned}</td>
        <td>${row.right.total}</td>
        <td>${row.right.shipped}</td>
        <td>${row.right.received}</td>
        <td>${row.right.returned}</td>
      `;
      compareBody.appendChild(tr);
    });
  }

  async function readExcelFile(file){
    const buffer = await file.arrayBuffer();
    const workbook = XLSX.read(buffer, { type: 'array' });
    const sheetName = workbook.SheetNames[0];
    const worksheet = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
    return rows;
  }

  function hideSplash(){
    const splash = document.getElementById('splashOverlay');
    if(!splash) return;
    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 500);
  }

  fileInput.addEventListener('change', e => setFiles(e.target.files));

  ['dragenter','dragover'].forEach(evt => {
    dropzone.addEventListener(evt, e => {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.add('drag');
    });
  });
  ['dragleave','drop'].forEach(evt => {
    dropzone.addEventListener(evt, e => {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.remove('drag');
    });
  });
  dropzone.addEventListener('drop', e => {
    const files = e.dataTransfer && e.dataTransfer.files ? e.dataTransfer.files : [];
    if(files.length) setFiles(files);
  });

  resetBtn.addEventListener('click', () => {
    selectedFiles = [];
    fileInput.value = '';
    labelAInput.value = '';
    labelBInput.value = '';
    selectedFilesEl.innerHTML = '';
    stats.style.display = 'none';
    previewWrap.style.display = 'none';
    compareHead.innerHTML = '';
    compareBody.innerHTML = '';
    lastDownloadBlob = null;
    lastDownloadName = '';
    hideMessages();
    setActiveTab(tabUpload);
  });

  processBtn.addEventListener('click', async () => {
    hideMessages();

    if(selectedFiles.length < 1){
      showErr('Hãy chọn ít nhất 1 file Excel.');
      return;
    }

    processBtn.disabled = true;
    processBtn.querySelector('span').textContent = 'Đang xử lý...';

    try{
      if(selectedFiles.length === 1){
        const file = selectedFiles[0];
        const rows = await readExcelFile(file);
        const result = processOrders(rows);

        renderSingleTable(result);

        statFiles.textContent = 1;
        statProducts.textContent = result.summary.length;
        statOrdersA.textContent = result.totals.total;
        statOrdersB.textContent = 0;
        stats.style.display = 'grid';
        previewWrap.style.display = 'block';

        const safeName = (file.name || 'orders').replace(/\.xlsx?$/i, '').replace(/[^a-zA-Z0-9_-]+/g,'_');
        lastDownloadName = `${safeName}_processed.xlsx`;
        lastDownloadBlob = buildSingleWorkbookBlob(result, rows);

        showOk('Đã xử lý xong file. Bấm tab Tải xuống để lưu file Excel.');
        previewWrap.scrollIntoView({ behavior:'smooth', block:'start' });
        setActiveTab(tabPreview);
      } else {
        const fileA = selectedFiles[0];
        const fileB = selectedFiles[1];
        const labelA = labelAInput.value.trim() || suggestLabel(fileA.name);
        const labelB = labelBInput.value.trim() || suggestLabel(fileB.name);

        const [rowsA, rowsB] = await Promise.all([readExcelFile(fileA), readExcelFile(fileB)]);
        const resultA = processOrders(rowsA);
        const resultB = processOrders(rowsB);
        const mergedRows = mergeTwoSummaries(resultA, resultB);

        renderCompareTable(labelA, labelB, resultA, resultB, mergedRows);

        statFiles.textContent = selectedFiles.length;
        statProducts.textContent = mergedRows.length;
        statOrdersA.textContent = resultA.totals.total;
        statOrdersB.textContent = resultB.totals.total;
        stats.style.display = 'grid';
        previewWrap.style.display = 'block';

        const safeA = labelA.replace(/[^a-zA-Z0-9_-]+/g,'_') || 'A';
        const safeB = labelB.replace(/[^a-zA-Z0-9_-]+/g,'_') || 'B';
        lastDownloadName = `so_sanh_${safeA}_${safeB}.xlsx`;
        lastDownloadBlob = buildWorkbookBlob(labelA, labelB, resultA, resultB, mergedRows, rowsA, rowsB);

        showOk('Đã tạo xong bảng so sánh. Bấm tab Tải xuống để lưu file Excel.');
        previewWrap.scrollIntoView({ behavior:'smooth', block:'start' });
        setActiveTab(tabPreview);
      }
    } catch(err){
      showErr(err && err.message ? err.message : 'Có lỗi xảy ra khi xử lý file.');
    } finally {
      processBtn.disabled = false;
      processBtn.querySelector('span').textContent = 'Xử lý file';
    }
  });

  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  tabUpload.addEventListener('click', () => {
    setActiveTab(tabUpload);
    sectionUpload.scrollIntoView({ behavior:'smooth', block:'start' });
  });

  tabPreview.addEventListener('click', () => {
    if(previewWrap.style.display === 'none'){
      showErr('Chưa có dữ liệu xem trước. Hãy xử lý file trước.');
      return;
    }
    setActiveTab(tabPreview);
    previewWrap.scrollIntoView({ behavior:'smooth', block:'start' });
  });

  tabDownload.addEventListener('click', () => {
    if(!lastDownloadBlob){
      showErr('Chưa có file kết quả để tải. Hãy xử lý file trước.');
      return;
    }
    setActiveTab(tabDownload);
    triggerDownload(lastDownloadBlob, lastDownloadName || 'so_sanh.xlsx');
    showOk('Đã tải file Excel so sánh.');
  });

  initTheme();
  window.addEventListener('load', () => setTimeout(hideSplash, 1100));
  setTimeout(hideSplash, 1800);
})();
</script>
</body>
</html>
