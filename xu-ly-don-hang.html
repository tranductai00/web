<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme Tom</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #dcdcdc;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .image-box {
      text-align: center;
    }

    .image-box img {
      display: block;
      max-width: min(90vw, 700px);
      max-height: 80vh;
      width: auto;
      height: auto;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      user-select: none;
      -webkit-user-drag: none;
    }

    .hint {
      margin-top: 14px;
      color: #444;
      font-size: 14px;
    }

    .music-btn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }

    .music-btn:hover {
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <audio id="bg-music" loop preload="auto" style="display: none;">
    <source src="cay_e_leu_leu_cay_Do_mixi.mp3" type="audio/mpeg" />
    Trình duyệt của bạn không hỗ trợ phát âm thanh.
  </audio>

  <div class="container">
    <div class="image-box">
      <img
        src="https://tte.edu.vn/upload/2025/09/meme-leu-leu-05.webp"
        alt="Meme Tom lè lưỡi"
      />
      <div class="hint"></div>
    </div>
  </div>

  <button class="music-btn" id="musicToggle" type="button">🔊</button>

  <script>
    const audio = document.getElementById('bg-music');
    const musicToggle = document.getElementById('musicToggle');
    let hasStarted = false;

    audio.volume = 0.3;

    async function startMusic() {
      try {
        await audio.play();
        hasStarted = true;
      } catch (error) {
        // Trình duyệt có thể chặn autoplay có âm thanh.
      }
    }

    startMusic();

    document.addEventListener('click', () => {
      if (!hasStarted) startMusic();
    }, { once: true });

    document.addEventListener('touchstart', () => {
      if (!hasStarted) startMusic();
    }, { once: true });

    musicToggle.addEventListener('click', async () => {
      if (audio.paused) {
        try {
          await audio.play();
          hasStarted = true;
        } catch (error) {}
      } else {
        audio.pause();
      }
    });

    audio.addEventListener('ended', () => {
      audio.currentTime = 0;
      audio.play().catch(() => {});
    });
  </script>
</body>
</html>
